name: Daily Briefing

on:
  schedule:
    # 8:30 AM Nepal Standard Time (UTC+5:45) = 2:45 AM UTC
    - cron: '45 2 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google token files
        run: |
          echo "${{ secrets.GOOGLE_TOKEN_KATUWALANUP_GMAIL }}" | base64 -d > google_token_katuwalanup_gmail.com.json
          echo "${{ secrets.GOOGLE_TOKEN_COUGARS }}"           | base64 -d > google_token_akatuwal1_cougars.ccis.edu.json
          echo "${{ secrets.GOOGLE_TOKEN_NCIT }}"              | base64 -d > google_token_anup.202854_ncit.edu.np.json

      - name: Write Microsoft token cache
        run: |
          if [ -n "${{ secrets.MS_TOKEN_CACHE_HOTMAIL }}" ]; then
            echo "${{ secrets.MS_TOKEN_CACHE_HOTMAIL }}" | base64 -d > ms_token_cache_katuwalanup_hotmail.com.json
          fi
          if [ -n "${{ secrets.MS_TOKEN_CACHE_OUTLOOK }}" ]; then
            echo "${{ secrets.MS_TOKEN_CACHE_OUTLOOK }}" | base64 -d > ms_token_cache_anup.katuwal2025_outlook.com.json
          fi

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ACCOUNTS:       ${{ secrets.GMAIL_ACCOUNTS }}
          GOOGLE_CREDENTIALS_PATH: ""
          MS_CLIENT_ID:         ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID:         common
          MS_ACCOUNTS:          ${{ secrets.MS_ACCOUNTS }}
          NEWS_RSS_FEEDS:       ${{ secrets.NEWS_RSS_FEEDS }}
          GMAIL_SMTP_USER:      ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_PASSWORD:  ${{ secrets.GMAIL_SMTP_PASSWORD }}
          BRIEFING_TO_EMAIL:    ${{ secrets.BRIEFING_TO_EMAIL }}
        run: python briefing.py
