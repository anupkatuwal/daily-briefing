name: Daily Briefing

on:
  schedule:
    - cron: '15 4 * * *'  # 10:00 AM Nepal Time (UTC+5:45)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Write Google OAuth token
        run: echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NEWS_RSS_FEEDS: https://feeds.bbci.co.uk/news/rss.xml,https://rss.cnn.com/rss/edition.rss
        run: python3 briefing.py
